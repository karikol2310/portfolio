    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="J. Karikol Raja | Software Developer" />

    <meta name="twitter:image" content="https://karikolraja.online/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "J. Karikol Raja",
      "jobTitle": "Junior Software Developer",
      "worksFor": {
        "@type": "Organization",
        "name": "Skillmine Technology Consulting"
      },
      "url": "https://karikolraja.online",
      "sameAs": [
        "https://www.linkedin.com/in/j-karikol-raja-018292219",
        "https://github.com/karikol2310"
      ],
      "knowsAbout": ["React", "Next.js", "TypeScript", "NestJS", "MongoDB", "Node.js", "JavaScript"]
    }
    </script>

    <!-- Theme initialization (before paint to prevent FOUC) -->
    <script>
      (function(){var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',t==='light'?'#ffffff':'#060d18')})()
    </script>

    <!-- Critical CSS for prerendered content -->
    <style>
      body{margin:0;background:#060d18}
      [data-theme="light"] body{background:#ffffff}
      .prerender-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,sans-serif;padding:5rem 1.25rem 0}
      .prerender-hero__inner{max-width:560px;text-align:center}
      .prerender-hero h1{font-size:2.5rem;font-weight:800;line-height:1.15;margin:0 0 1rem;color:#e6f1ff}
      .prerender-hero h1 span{background:linear-gradient(135deg,#00d4ff,#00b4d8,#0077b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      .prerender-hero h2{font-size:1.15rem;font-weight:500;color:#8892b0;margin:0 0 1.25rem}
      .prerender-hero p{color:#7a84a0;font-size:0.95rem;line-height:1.7;margin:0 auto;max-width:480px}
      [data-theme="light"] .prerender-hero h1{color:#0f172a}
      [data-theme="light"] .prerender-hero h1 span{background:linear-gradient(135deg,#0891b2,#0e7490,#155e75);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      [data-theme="light"] .prerender-hero h2{color:#475569}
      [data-theme="light"] .prerender-hero p{color:#64748b}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Prerendered hero for instant FCP/LCP — replaced by React on mount -->
      <div class="prerender-hero">
        <div class="prerender-hero__inner">
          <h1>Hi, I'm <span>Karikol Raja</span></h1>
          <h2>Junior Software Developer</h2>
          <p>I build modern web applications with clean code and thoughtful user experiences. Based in Chennai, India.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
